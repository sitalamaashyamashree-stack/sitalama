<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watermark Tool</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #020617, #0f172a);
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    width: 420px;
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(30, 41, 59, 0.65);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);

    display: flex;
    flex-direction: column;
    gap: 18px;
    text-align: center;
}

h2 {
    font-weight: 600;
}

/* Upload */
.upload-box {
    border: 2px dashed #38bdf8;
    border-radius: 12px;
    height: 90px;

    display: flex;
    justify-content: center;
    align-items: center;

    cursor: pointer;
    transition: 0.3s;
}

.upload-box:hover {
    background: rgba(56,189,248,0.15);
}

/* Hidden input */
input[type="file"] {
    display: none;
}

/* Canvas */
canvas {
    width: 100%;
    max-height: 220px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 10px;
}

/* Slider */
.slider {
    font-size: 14px;
}

.slider input {
    width: 100%;
}

/* Buttons */
.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="container">

    <h2>✨ Watermark Tool</h2>

    <!-- Upload FIX -->
    <label for="uploadInput" class="upload-box">
        Click to Upload Image
    </label>
    <input type="file" id="uploadInput" accept="image/*">

    <!-- Preview -->
    <canvas id="canvas"></canvas>

    <!-- Size control -->
    <div class="slider">
        Watermark Size
        <input type="range" id="sizeSlider" min="10" max="50" value="30">
    </div>

    <!-- Buttons -->
    <div class="controls">
        <button onclick="downloadImage()">Download</button>
        <button onclick="resetCanvas()">Reset</button>
    </div>

</div>

<script>
const upload = document.getElementById('uploadInput');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('sizeSlider');

const logo = new Image();
logo.src = "SSMCT Logo1.png"; // 👉 তোর logo file

let currentImage = null;

/* Upload */
upload.addEventListener('change', function(e) {
    const file = e.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(event) {
        const img = new Image();

        img.onload = function() {
            currentImage = img;
            drawImage();
        };

        img.src = event.target.result;
    };

    reader.readAsDataURL(file);
});

/* Slider change */
slider.addEventListener('input', drawImage);

/* Draw function */
function drawImage() {
    if (!currentImage || !logo.complete) return;

    canvas.width = currentImage.width;
    canvas.height = currentImage.height;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // main image
    ctx.drawImage(currentImage, 0, 0);

    // scale
    const percent = slider.value / 100;

    const scale = Math.min(
        canvas.width / logo.width,
        canvas.height / logo.height
    ) * percent;

    const w = logo.width * scale;
    const h = logo.height * scale;

    // PERFECT CENTER
    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;

    ctx.globalAlpha = 0.35;
    ctx.drawImage(logo, x, y, w, h);
    ctx.globalAlpha = 1;
}

/* Download */
function downloadImage() {
    const link = document.createElement('a');
    link.download = "watermarked.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
}

/* Reset */
function resetCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    currentImage = null;
}
</script>

</body>
</html>
