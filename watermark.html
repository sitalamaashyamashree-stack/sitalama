<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watermark Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:#e2e8f0;
}

/* Layout */
.container{
    display:flex;
    height:100vh;
}

/* Sidebar */
.sidebar{
    width:270px;
    padding:20px;
    background:rgba(15,23,42,0.8);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(255,255,255,0.05);
    display:flex;
    flex-direction:column;
    gap:18px;
}

.sidebar h3{
    text-align:center;
}

/* Upload */
.upload-box{
    border:2px dashed #38bdf8;
    padding:16px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}
.upload-box:hover{
    background:rgba(56,189,248,0.1);
}
input[type="file"]{display:none;}

/* Controls */
label{font-size:13px;}
select,input[type=range]{width:100%;margin-top:5px;}

input[type=range]{
    height:6px;
    accent-color:#38bdf8;
}

span{color:#38bdf8;font-weight:bold;}

/* Buttons */
button{
    padding:12px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:black;
    font-weight:bold;
    cursor:pointer;
}
button:hover{transform:translateY(-2px);}
.reset{
    background:linear-gradient(135deg,#ef4444,#dc2626);
    color:white;
}

/* Main */
.main{
    flex:1;
    padding:20px;
    overflow:auto;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:15px;
}

canvas{
    width:100%;
    border-radius:12px;
    background:#0003;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* Mobile */
@media(max-width:768px){
    .container{flex-direction:column;}
    .sidebar{width:100%;}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3>✨ Watermark Studio</h3>

<label class="upload-box" for="upload">Upload Images</label>
<input type="file" id="upload" multiple>

<label>Position</label>
<select id="position">
<option value="center">Center</option>
<option value="top-left">Top Left</option>
<option value="top-right">Top Right</option>
<option value="bottom-left">Bottom Left</option>
<option value="bottom-right">Bottom Right</option>
<option value="custom">Custom (Drag)</option>
</select>

<label>Size: <span id="sizeVal">30%</span></label>
<input type="range" id="size" min="10" max="80" value="30">

<label>Opacity: <span id="opacityVal">30%</span></label>
<input type="range" id="opacity" min="1" max="100" value="30">

<button onclick="downloadZIP()">Download ZIP</button>
<button class="reset" onclick="resetAll()">Reset</button>
    <label>Text Watermark</label>
<input type="text" id="textInput" placeholder="Enter text">

<label>Text Size</label>
<input type="range" id="textSize" min="10" max="80" value="30">

<label>Text Color</label>
<input type="color" id="textColor" value="#ffffff">

<label>Rotation</label>
<input type="range" id="rotation" min="0" max="360" value="0">

<label>Tile Gap</label>
<input type="range" id="gap" min="20" max="150" value="40">

<button onclick="downloadSingle()">Download First Image</button>

</div>

<div class="main">
<div class="grid" id="grid"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const upload=document.getElementById("upload");
const grid=document.getElementById("grid");

const size=document.getElementById("size");
const opacity=document.getElementById("opacity");
const position=document.getElementById("position");

const sizeVal=document.getElementById("sizeVal");
const opacityVal=document.getElementById("opacityVal");

/* show values */
sizeVal.innerText=size.value+"%";
opacityVal.innerText=opacity.value+"%";

size.oninput=()=>sizeVal.innerText=size.value+"%";
opacity.oninput=()=>opacityVal.innerText=opacity.value+"%";

/* logo */
const logo=new Image();
logo.src="SSMCT Logo1.png";

let images=[];

/* upload */
upload.addEventListener("change",e=>{
images=[];
grid.innerHTML="";

Array.from(e.target.files).forEach(file=>{
const reader=new FileReader();

reader.onload=ev=>{
const img=new Image();

img.onload=()=>{
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const item={img,canvas,ctx,x:img.width/2,y:img.height/2};

images.push(item);
grid.appendChild(canvas);

/* drag */
canvas.addEventListener("mousedown",()=>item.dragging=true);
canvas.addEventListener("mouseup",()=>item.dragging=false);

canvas.addEventListener("mousemove",e=>{
if(item.dragging && position.value==="custom"){
const rect=canvas.getBoundingClientRect();
item.x=(e.clientX-rect.left)*(canvas.width/rect.width);
item.y=(e.clientY-rect.top)*(canvas.height/rect.height);
drawAll();
}
});

drawAll();
};

img.src=ev.target.result;
};

reader.readAsDataURL(file);
});
});

/* controls */
[size,opacity,position].forEach(el=>{
el.addEventListener("input",drawAll);
});

/* draw */
function drawAll(){
if(!logo.complete)return;

images.forEach(item=>{
const {img,canvas,ctx}=item;

canvas.width=img.width;
canvas.height=img.height;

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0);

const scale=Math.min(canvas.width/logo.width,canvas.height/logo.height)*(size.value/100);

const w=logo.width*scale;
const h=logo.height*scale;

ctx.globalAlpha=opacity.value/100;

let x,y;

switch(position.value){
case "center":
x=(canvas.width-w)/2;y=(canvas.height-h)/2;break;
case "top-left":
x=10;y=10;break;
case "top-right":
x=canvas.width-w-10;y=10;break;
case "bottom-left":
x=10;y=canvas.height-h-10;break;
case "bottom-right":
x=canvas.width-w-10;y=canvas.height-h-10;break;
default:
x=item.x-w/2;y=item.y-h/2;
}

ctx.drawImage(logo,x,y,w,h);
ctx.globalAlpha=1;
});
}

/* ZIP */
async function downloadZIP(){
const zip=new JSZip();

for(let i=0;i<images.length;i++){
const blob=await new Promise(res=>{
images[i].canvas.toBlob(res,"image/png");
});
zip.file("image_"+i+".png",blob);
}

const content=await zip.generateAsync({type:"blob"});
const link=document.createElement("a");
link.href=URL.createObjectURL(content);
link.download="watermarked.zip";
link.click();
}

/* reset */
function resetAll(){
images=[];
grid.innerHTML="";
upload.value="";
}
</script>
    <script>
const textInput=document.getElementById("textInput");
const textSize=document.getElementById("textSize");
const textColor=document.getElementById("textColor");
const rotation=document.getElementById("rotation");
const gap=document.getElementById("gap");

/* touch support */
function enableTouch(canvas,item){
canvas.addEventListener("touchmove",(e)=>{
if(position.value==="custom"){
const rect=canvas.getBoundingClientRect();
const touch=e.touches[0];

item.x=(touch.clientX-rect.left)*(canvas.width/rect.width);
item.y=(touch.clientY-rect.top)*(canvas.height/rect.height);

drawAll();
}
});
}

/* update draw */
function drawAll(){
if(!logo.complete)return;

images.forEach(item=>{
const {img,canvas,ctx}=item;

canvas.width=img.width;
canvas.height=img.height;

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0);

const scale=Math.min(canvas.width/logo.width,canvas.height/logo.height)*(size.value/100);
const w=logo.width*scale;
const h=logo.height*scale;

ctx.globalAlpha=opacity.value/100;

let x,y;

switch(position.value){
case "center": x=(canvas.width-w)/2; y=(canvas.height-h)/2; break;
case "top-left": x=10; y=10; break;
case "top-right": x=canvas.width-w-10; y=10; break;
case "bottom-left": x=10; y=canvas.height-h-10; break;
case "bottom-right": x=canvas.width-w-10; y=canvas.height-h-10; break;
default: x=item.x-w/2; y=item.y-h/2;
}

/* rotation */
ctx.save();
ctx.translate(x+w/2,y+h/2);
ctx.rotate(rotation.value*Math.PI/180);
ctx.drawImage(logo,-w/2,-h/2,w,h);
ctx.restore();

/* TEXT WATERMARK */
if(textInput.value){
ctx.fillStyle=textColor.value;
ctx.font=textSize.value+"px Arial";
ctx.fillText(textInput.value,20,40);
}

ctx.globalAlpha=1;
});
}

/* tile gap control */
if(position.value==="tile"){
for(let x=0;x<canvas.width;x+=w+gap.value){
for(let y=0;y<canvas.height;y+=h+gap.value){
ctx.drawImage(logo,x,y,w,h);
}
}
}

/* download single */
function downloadSingle(){
if(images.length===0)return;

const link=document.createElement("a");
link.download="image.png";
link.href=images[0].canvas.toDataURL();
link.click();
}
</script>

</body>
</html>
