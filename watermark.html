<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Watermark Tool</title>

<style>
body {
    background: linear-gradient(135deg, #020617, #0f172a);
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    width: 420px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(30,41,59,0.7);
    backdrop-filter: blur(15px);
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.upload-box {
    border: 2px dashed #38bdf8;
    padding: 25px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
}

input[type="file"] {
    display: none;
}

canvas {
    width: 100%;
    max-height: 220px;
    background: #0003;
    border-radius: 10px;
}

/* Controls */
select, input[type=range] {
    width: 100%;
    padding: 5px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h3>🔐 Secure Watermark</h3>

<label for="upload" class="upload-box">Upload Image</label>
<input type="file" id="upload">

<canvas id="canvas"></canvas>

<!-- Position -->
<select id="position">
<option value="center">Center</option>
<option value="top-left">Top Left</option>
<option value="top-right">Top Right</option>
<option value="bottom-left">Bottom Left</option>
<option value="bottom-right">Bottom Right</option>
<option value="tile">Tile (Full Protection)</option>
</select>

<!-- Size -->
<input type="range" id="size" min="10" max="50" value="30">

<button onclick="download()">Download</button>

</div>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const position = document.getElementById("position");
const size = document.getElementById("size");

const logo = new Image();
logo.src = "SSMCT Logo1.png";

let imgData = null;

upload.addEventListener("change", (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(ev) {
        const img = new Image();

        img.onload = function() {
            imgData = img;
            draw();
        };

        img.src = ev.target.result;
    };

    reader.readAsDataURL(file);
});

position.addEventListener("change", draw);
size.addEventListener("input", draw);

function draw() {
    if (!imgData || !logo.complete) return;

    canvas.width = imgData.width;
    canvas.height = imgData.height;

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(imgData,0,0);

    const percent = size.value / 100;
    const scale = Math.min(canvas.width/logo.width, canvas.height/logo.height) * percent;

    const w = logo.width * scale;
    const h = logo.height * scale;

    ctx.globalAlpha = 0.3;

    const pos = position.value;

    if (pos === "center") {
        ctx.drawImage(logo, (canvas.width-w)/2, (canvas.height-h)/2, w, h);
    }

    else if (pos === "top-left") {
        ctx.drawImage(logo, 10, 10, w, h);
    }

    else if (pos === "top-right") {
        ctx.drawImage(logo, canvas.width-w-10, 10, w, h);
    }

    else if (pos === "bottom-left") {
        ctx.drawImage(logo, 10, canvas.height-h-10, w, h);
    }

    else if (pos === "bottom-right") {
        ctx.drawImage(logo, canvas.width-w-10, canvas.height-h-10, w, h);
    }

    // 🔥 TILE (hard to remove)
    else if (pos === "tile") {
        for (let x = 0; x < canvas.width; x += w + 40) {
            for (let y = 0; y < canvas.height; y += h + 40) {
                ctx.drawImage(logo, x, y, w, h);
            }
        }
    }

    ctx.globalAlpha = 1;
}

function download() {
    const link = document.createElement("a");
    link.download = "secure-watermark.png";
    link.href = canvas.toDataURL();
    link.click();
}
</script>

</body>
</html>
