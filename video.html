<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Working Media Converter</title>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
min-height:100vh;
color:white;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,.08);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
}

h1{
margin-bottom:10px;
}

p{
opacity:.8;
margin-bottom:20px;
}

input,button,select{
padding:12px 16px;
border:none;
border-radius:10px;
margin:10px 6px 0 0;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.item{
background:rgba(255,255,255,.06);
padding:14px;
border-radius:14px;
margin-top:12px;
}

.progress{
height:8px;
background:#334155;
border-radius:50px;
margin-top:10px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
}

a{
color:white;
text-decoration:none;
background:#10b981;
padding:8px 12px;
border-radius:8px;
display:inline-block;
margin-top:10px;
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<h1>Working Video Converter</h1>
<p>Real conversion with FFmpeg</p>

<input type="file" id="files" multiple>

<button onclick="loadFFmpeg()">Load Engine</button>

<select id="format">
<option value="mp4">MP4</option>
<option value="avi">AVI</option>
<option value="mov">MOV</option>
<option value="webm">WEBM</option>
</select>

<button onclick="convertFiles()">Convert</button>
<button onclick="clearFiles()">Clear</button>

<h3 id="status">Ready</h3>

<div id="list"></div>

</div>
</div>

<script>
function el(id){
return document.getElementById(id);
}

const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log:true });

let loaded = false;
let selectedFiles = [];

el("files").addEventListener("change", function(e){
selectedFiles = [...e.target.files];
renderFiles();
});

function renderFiles(){
el("list").innerHTML = "";

selectedFiles.forEach((file,index)=>{
el("list").innerHTML += `
<div class="item">
<b>${file.name}</b>
<div class="progress">
<div class="bar" id="bar${index}"></div>
</div>
<div id="msg${index}">Waiting</div>
</div>
`;
});
}

async function loadFFmpeg(){
try{
el("status").innerText = "Loading Engine...";
await ffmpeg.load();
loaded = true;
el("status").innerText = "Engine Ready";
}catch(error){
el("status").innerText = "Load Failed";
}
}

function clearFiles(){
selectedFiles = [];
el("files").value = "";
el("list").innerHTML = "";
el("status").innerText = "Cleared";
}

async function convertFiles(){

if(!selectedFiles.length){
el("status").innerText = "Choose files first";
return;
}

if(!loaded){
await loadFFmpeg();
}

const format = el("format").value;

for(let i=0;i<selectedFiles.length;i++){

const file = selectedFiles[i];
const inputName = "input_" + i + "_" + file.name;
const outputName = file.name.replace(/\.[^.]+$/,"") + "." + format;

el("msg"+i).innerText = "Processing...";

ffmpeg.setProgress(({ ratio })=>{
el("bar"+i).style.width = Math.round(ratio*100) + "%";
});

try{

ffmpeg.FS("writeFile", inputName, await fetchFile(file));

await ffmpeg.run(
"-i", inputName,
outputName
);

const data = ffmpeg.FS("readFile", outputName);

const url = URL.createObjectURL(
new Blob([data.buffer])
);

el("msg"+i).innerHTML =
`<a href="${url}" download="${outputName}">Download ${outputName}</a>`;

}catch(err){
el("msg"+i).innerText = "Failed";
}

}

el("status").innerText = "Done";
}
</script>

</body>
</html>
