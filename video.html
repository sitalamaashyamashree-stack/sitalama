<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Working Video Converter</title>
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827,#1e293b);min-height:100vh;color:#fff;padding:30px}
.container{max-width:1000px;margin:auto}
.card{background:rgba(255,255,255,.08);backdrop-filter:blur(12px);padding:30px;border-radius:22px}
h1{margin-bottom:10px}p{opacity:.8;margin-bottom:20px}
.drop{border:2px dashed rgba(255,255,255,.25);padding:40px;text-align:center;border-radius:20px}
button,select,input{padding:12px 16px;border:none;border-radius:10px;margin:10px 6px 0 0}
button{background:#2563eb;color:#fff;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:20px}
.item{background:rgba(255,255,255,.06);padding:14px;border-radius:16px}.barwrap{height:8px;background:#334155;border-radius:99px;overflow:hidden;margin-top:10px}.bar{height:100%;width:0;background:#22c55e}
a{color:#93c5fd}
</style>
</head>
<body>
<div class='container'><div class='card'>
<h1>Video Converter</h1>
<p>Upload videos and convert to another format in browser.</p>
<div class='drop' id='drop'>Drag & Drop Files Here<br><br><input type='file' id='files' multiple></div>
<div>
<button onclick='loadEngine()'>Load Engine</button>
<select id='format'><option value='mp4'>MP4</option><option value='mov'>MOV</option><option value='avi'>AVI</option><option value='webm'>WEBM</option></select>
<button onclick='convertAll()'>Convert All</button>
</div>
<h3 id='status'>Ready</h3>
<div class='grid' id='list'></div>
</div></div>
<script>
function el(id){return document.getElementById(id)}
const {createFFmpeg,fetchFile}=FFmpeg; const ffmpeg=createFFmpeg({log:true});
let loaded=false; let files=[];
function render(){el('list').innerHTML=files.map((f,i)=>`<div class='item'><b>${f.name}</b><div class='barwrap'><div class='bar' id='bar${i}'></div></div><div id='msg${i}'>Waiting</div></div>`).join('')}
el('files').onchange=e=>{files=[...e.target.files];render()};
el('drop').ondragover=e=>e.preventDefault();
el('drop').ondrop=e=>{e.preventDefault();files=[...e.dataTransfer.files];render()};
async function loadEngine(){try{el('status').innerText='Loading...'; if(!loaded){await ffmpeg.load(); loaded=true;} el('status').innerText='Ready';}catch(e){el('status').innerText='Load Failed';}}
async function convertAll(){if(!files.length)return; if(!loaded) await loadEngine(); const ext=el('format').value; for(let i=0;i<files.length;i++){const f=files[i]; const inName='in'+i+Date.now(); const out=f.name.replace(/\.[^.]+$/,'')+'.'+ext; el('msg'+i).innerText='Processing'; ffmpeg.setProgress(({ratio})=>{el('bar'+i).style.width=Math.round(ratio*100)+'%'}); try{ffmpeg.FS('writeFile',inName,await fetchFile(f)); await ffmpeg.run('-i',inName,out); const data=ffmpeg.FS('readFile',out); const url=URL.createObjectURL(new Blob([data.buffer])); el('msg'+i).innerHTML=`<a href='${url}' download='${out}'>Download</a>`;}catch(err){el('msg'+i).innerText='Failed';}} el('status').innerText='Done';}
</script>
</body>
</html>
