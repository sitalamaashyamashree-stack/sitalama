<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Intro Generator (Browser Pro)</title>

<style>
body {
    font-family: Arial;
    background: #020617;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: #0f172a;
    padding: 20px;
    border-radius: 10px;
}

input, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: none;
}

button {
    background: #22c55e;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

canvas {
    margin-top: 20px;
    background: black;
}

.suggestion {
    margin-top: 10px;
    padding: 10px;
    background: #1e293b;
}
</style>
</head>

<body>

<div class="container">
    <h2>🔥 AI Intro Generator (Pure JS)</h2>

    <input type="file" id="refVideo" accept="video/*">
    <div class="suggestion" id="suggestion">Upload video for AI detection</div>

    <input type="text" id="title" placeholder="Main Title">
    <input type="text" id="subtitle" placeholder="Subtitle">

    <input type="file" id="logoInput" accept="image/*">

    <select id="style">
        <option value="cinematic">Cinematic</option>
        <option value="glitch">Glitch</option>
        <option value="minimal">Minimal</option>
    </select>

    <button onclick="generate()">Generate Video</button>

    <canvas id="canvas" width="600" height="350"></canvas>

    <button id="download" style="display:none;">Download Video</button>
</div>

<script>

let detectedStyle = "minimal";

// 🎯 Fake AI Detection (frame color analysis)
document.getElementById("refVideo").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    const video = document.createElement("video");
    video.src = URL.createObjectURL(file);
    video.muted = true;

    video.addEventListener("loadeddata", () => {
        const tempCanvas = document.createElement("canvas");
        const ctx = tempCanvas.getContext("2d");

        tempCanvas.width = 200;
        tempCanvas.height = 100;

        ctx.drawImage(video, 0, 0, 200, 100);

        const data = ctx.getImageData(0,0,200,100).data;

        let brightness = 0;

        for(let i=0;i<data.length;i+=4){
            brightness += data[i] + data[i+1] + data[i+2];
        }

        brightness /= (data.length/4);

        if(brightness < 200) detectedStyle = "cinematic";
        else if(brightness > 400) detectedStyle = "minimal";
        else detectedStyle = "glitch";

        document.getElementById("suggestion").innerText =
            "AI Detected Style: " + detectedStyle;

        document.getElementById("style").value = detectedStyle;
    });
});

// 🎬 Generate Video
async function generate() {
    const title = document.getElementById("title").value;
    const subtitle = document.getElementById("subtitle").value;
    const style = document.getElementById("style").value;
    const logoFile = document.getElementById("logoInput").files[0];

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let logo = null;
    if(logoFile){
        logo = new Image();
        logo.src = URL.createObjectURL(logoFile);
        await new Promise(res => logo.onload = res);
    }

    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream);

    let chunks = [];
    recorder.ondataavailable = e => chunks.push(e.data);

    recorder.onstop = () => {
        const blob = new Blob(chunks, {type:"video/webm"});
        const url = URL.createObjectURL(blob);

        const btn = document.getElementById("download");
        btn.style.display = "block";
        btn.onclick = () => {
            const a = document.createElement("a");
            a.href = url;
            a.download = "intro.webm";
            a.click();
        };
    };

    recorder.start();

    let frame = 0;
    const total = 240;

    function draw(){
        ctx.fillStyle = "black";
        ctx.fillRect(0,0,canvas.width,canvas.height);

        // Logo
        if(frame < 60 && logo){
            ctx.globalAlpha = frame/60;
            ctx.drawImage(logo, 250, 80, 100, 100);
            ctx.globalAlpha = 1;
        }

        // Title
        if(frame >= 60){
            ctx.fillStyle = "#22c55e";
            ctx.font = "40px Arial";
            ctx.textAlign = "center";

            if(style === "cinematic"){
                ctx.globalAlpha = (frame-60)/120;
                ctx.fillText(title, canvas.width/2, 170);
                ctx.globalAlpha = 1;
            }

            if(style === "glitch"){
                let offset = Math.sin(frame*0.4)*6;
                ctx.fillText(title, canvas.width/2 + offset, 170);
            }

            if(style === "minimal"){
                ctx.fillText(title, canvas.width/2, 170);
            }
        }

        // Subtitle
        if(frame >= 120){
            ctx.fillStyle = "#94a3b8";
            ctx.font = "20px Arial";
            ctx.globalAlpha = (frame-120)/120;
            ctx.fillText(subtitle, canvas.width/2, 210);
            ctx.globalAlpha = 1;
        }

        frame++;
        if(frame < total){
            requestAnimationFrame(draw);
        } else {
            recorder.stop();
        }
    }

    draw();
}

</script>

</body>
</html>
