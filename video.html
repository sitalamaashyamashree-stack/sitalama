<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Bulk Converter</title>

<!-- FFmpeg -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#070b16;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

body::before,
body::after{
  content:'';
  position:fixed;
  border-radius:50%;
  filter:blur(70px);
  opacity:.35;
  animation:float 10s ease-in-out infinite;
}

body::before{
  width:320px;
  height:320px;
  background:#2563eb;
  top:5%;
  left:5%;
}

body::after{
  width:360px;
  height:360px;
  background:#10b981;
  right:5%;
  bottom:5%;
  animation-delay:-4s;
}

@keyframes float{

  0%,100%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-20px);
  }
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:30px;
  position:relative;
  z-index:2;
}

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:26px;
  padding:30px;
}

.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.title{
  font-size:42px;
  font-weight:800;
}

.sub{
  margin-top:5px;
  opacity:.8;
}

.drop{
  margin-top:24px;
  border:2px dashed rgba(255,255,255,.18);
  border-radius:20px;
  padding:40px;
  text-align:center;
}

.btns{
  margin-top:20px;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.btn,
#format{
  border:none;
  padding:14px 18px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.primary{
  background:#2563eb;
  color:#fff;
}

.secondary{
  background:#10b981;
  color:#fff;
}

.ghost,
#format{
  background:rgba(255,255,255,.08);
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
  margin-top:24px;
}

.item{
  background:rgba(255,255,255,.05);
  padding:16px;
  border-radius:18px;
}

.meta{
  margin-top:6px;
  font-size:13px;
  opacity:.75;
}

.progress{
  margin-top:12px;
  height:10px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  overflow:hidden;
}

.bar{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#22c55e,#3b82f6);
  transition:.2s;
}

.status{
  margin-top:10px;
  font-size:14px;
}

.download-btn{
  display:inline-block;
  margin-top:10px;
  background:#10b981;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
}

.footer{
  margin-top:20px;
  opacity:.75;
}

</style>

</head>

<body>

<div class="wrap">

  <div class="card">

    <div class="hero">

      <div>

        <div class="title">
          Pro Bulk Converter
        </div>

        <div class="sub">
          Convert videos using FFmpeg WASM
        </div>

      </div>

      <div id="global">
        Ready
      </div>

    </div>

    <div class="drop" id="drop">

      Drag & Drop Files Here

      <br><br>

      <input id="files" type="file" multiple>

    </div>

    <div class="btns">

      <button class="btn primary" onclick="loadEngine()">
        Load Engine
      </button>

      <select id="format">

        <option value="mp4">MP4</option>
        <option value="mov">MOV</option>
        <option value="avi">AVI</option>
        <option value="mkv">MKV</option>
        <option value="webm">WEBM</option>

      </select>

      <button class="btn secondary" onclick="startConvert()">
        Convert All
      </button>

      <button class="btn ghost" onclick="clearQueue()">
        Clear
      </button>

    </div>

    <div class="grid" id="list"></div>

    <div class="footer">
      Browser FFmpeg may fail on very large files.
    </div>

  </div>

</div>

<script>

function el(id){
  return document.getElementById(id);
}

let files = [];

let ffmpeg = null;

let fetchFile = null;

function render(){

  el('list').innerHTML = files.map((f,i)=>`

    <div class="item">

      <b>${f.name}</b>

      <div class="meta">

        ${(f.size / 1048576).toFixed(2)} MB

      </div>

      <div class="progress">

        <div class="bar" id="bar${i}"></div>

      </div>

      <div class="status" id="msg${i}">
        Ready
      </div>

    </div>

  `).join('');
}

window.addEventListener('DOMContentLoaded',()=>{

  el('files').onchange=(e)=>{

    files = [...e.target.files];

    render();
  };

  const drop = el('drop');

  drop.ondragover=(e)=>{
    e.preventDefault();
  };

  drop.ondrop=(e)=>{

    e.preventDefault();

    files = [...e.dataTransfer.files];

    render();
  };

});

async function loadEngine(){

  try{

    el('global').innerText='Loading Engine...';

    const { createFFmpeg, fetchFile:ffFetchFile } = FFmpeg;

    fetchFile = ffFetchFile;

    ffmpeg = createFFmpeg({

      log:true,

      corePath:
      'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'

    });

    await ffmpeg.load();

    el('global').innerText='Engine Loaded';

  }catch(err){

    console.error(err);

    el('global').innerText='Engine Failed';

    alert(
      'FFmpeg failed to load.\n\n' +
      'IMPORTANT:\n' +
      'You MUST add SharedArrayBuffer headers.\n\n' +
      'Create .htaccess file.'
    );
  }
}

function clearQueue(){

  files = [];

  el('files').value='';

  render();

  el('global').innerText='Queue Cleared';
}

async function startConvert(){

  if(!ffmpeg){

    el('global').innerText='Load Engine First';

    return;
  }

  if(!files.length){

    el('global').innerText='Select Files';

    return;
  }

  const ext = el('format').value;

  el('global').innerText='Converting...';

  for(let i=0;i<files.length;i++){

    const file = files[i];

    try{

      el('msg'+i).innerText='Preparing...';

      ffmpeg.setProgress(({ ratio })=>{

        const percent = Math.min(100, ratio * 100);

        el('bar'+i).style.width = percent + '%';

        el('msg'+i).innerText =
          'Converting ' + percent.toFixed(0) + '%';
      });

      const inputName = file.name;

      const outputName =
        file.name.replace(/\.[^.]+$/,'') + '.' + ext;

      ffmpeg.FS(
        'writeFile',
        inputName,
        await fetchFile(file)
      );

      if(ext === 'webm'){

        await ffmpeg.run(
          '-i',
          inputName,
          '-c:v',
          'libvpx',
          '-c:a',
          'libvorbis',
          outputName
        );

      }else{

        await ffmpeg.run(
          '-i',
          inputName,
          '-c:v',
          'libx264',
          '-preset',
          'ultrafast',
          '-c:a',
          'aac',
          outputName
        );
      }

      const data = ffmpeg.FS(
        'readFile',
        outputName
      );

      let mime='video/mp4';

      if(ext==='mov'){
        mime='video/quicktime';
      }

      if(ext==='avi'){
        mime='video/x-msvideo';
      }

      if(ext==='mkv'){
        mime='video/x-matroska';
      }

      if(ext==='webm'){
        mime='video/webm';
      }

      const blob = new Blob(
        [data.buffer],
        { type:mime }
      );

      const url = URL.createObjectURL(blob);

      el('msg'+i).innerHTML = `

        Completed

        <br><br>

        <a
          href="${url}"
          download="${outputName}"
          class="download-btn">

          Download ${outputName}

        </a>
      `;

      ffmpeg.FS('unlink', inputName);

      ffmpeg.FS('unlink', outputName);

    }catch(err){

      console.error(err);

      el('msg'+i).innerText='Conversion Failed';
    }
  }

  el('global').innerText='All Conversions Completed';
}

</script>

</body>
</html>
