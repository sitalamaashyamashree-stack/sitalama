<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Link to MP4 Downloader</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:40px;
}

.box{
max-width:700px;
margin:auto;
background:#111827;
padding:30px;
border-radius:16px;
}

input,button,select{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

pre{
background:#000;
padding:14px;
border-radius:10px;
margin-top:20px;
overflow:auto;
}
</style>
</head>
<body>

<div class="box">

<h1>Any Video Link to MP4</h1>

<input type="text" id="url" placeholder="Paste Video Link">

<select id="quality">
<option value="best">Best Quality</option>
<option value="720">720p</option>
<option value="480">480p</option>
</select>

<button onclick="showCode()">Generate Command</button>

<pre id="result"></pre>

</div>

<script>
function showCode(){

let url = document.getElementById("url").value.trim();

if(url===""){
alert("Paste link first");
return;
}

let q = document.getElementById("quality").value;

let cmd = "";

if(q==="best"){
cmd =
`yt-dlp -f bestvideo+bestaudio --merge-output-format mp4 "${url}"`;
}else{
cmd =
`yt-dlp -f "bestvideo[height<=${q}]+bestaudio/best[height<=${q}]" --merge-output-format mp4 "${url}"`;
}

document.getElementById("result").textContent = cmd;
}
</script>

</body>
</html>
