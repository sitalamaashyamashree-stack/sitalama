<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Video Studio</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* Container */
.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
    text-align: center;
}

/* Card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Inputs */
input {
    width: 80%;
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

/* Upload box */
.upload-box {
    border: 2px dashed #38bdf8;
    padding: 30px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.upload-box:hover {
    background: rgba(56,189,248,0.1);
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.05);
}

/* Video */
.video-wrapper {
    position: relative;
    margin-top: 20px;
}

video {
    width: 100%;
    border-radius: 15px;
}

/* Overlay title */
.video-title {
    position: absolute;
    top: 15px;
    width: 100%;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    color: #38bdf8;
    text-shadow: 2px 2px 10px black;
}

/* Overlay subtitle */
.video-subtitle {
    position: absolute;
    top: 55px;
    width: 100%;
    text-align: center;
    font-size: 18px;
    color: #e2e8f0;
    text-shadow: 2px 2px 10px black;
}

/* Caption */
.caption {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #facc15;
    text-shadow: 2px 2px 10px black;
}
</style>

</head>
<body>

<div class="container">
    <div class="card">
        <h1>🎬 AI Video Studio</h1>

        <!-- Upload -->
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            📁 Click to Upload Video
            <input type="file" id="fileInput" hidden accept="video/*">
        </div>

        <!-- User Inputs -->
        <input type="text" id="userTitle" placeholder="Enter Video Title">
        <input type="text" id="userSubtitle" placeholder="Enter Subtitle">

        <button onclick="generate()">✨ Apply to Video</button>

        <!-- Video -->
        <div class="video-wrapper">
            <video id="video" controls></video>

            <div class="video-title" id="title"></div>
            <div class="video-subtitle" id="subtitle"></div>
            <div class="caption" id="caption">🔥 Grand Finale</div>
        </div>
    </div>
</div>

<script>
let videoFile = null;

document.getElementById("fileInput").addEventListener("change", function(e) {
    videoFile = e.target.files[0];

    if (videoFile) {
        const url = URL.createObjectURL(videoFile);
        document.getElementById("video").src = url;
    }
});

function generate() {
    if (!videoFile) {
        alert("Upload a video first!");
        return;
    }

    const title = document.getElementById("userTitle").value;
    const subtitle = document.getElementById("userSubtitle").value;

    document.getElementById("title").innerText = title || "No Title";
    document.getElementById("subtitle").innerText = subtitle || "No Subtitle";

    // Optional random caption
    const captions = [
        "🔥 This is the moment!",
        "💃 Dance like a champion!",
        "⚡ Energy on another level!",
        "👑 Grand Finale Begins!"
    ];

    document.getElementById("caption").innerText =
        captions[Math.floor(Math.random() * captions.length)];
}
</script>

</body>
</html>
