<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Converter</title>

<style>
body {
  background: #0b1a33;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.box {
  background: #1e2b45;
  padding: 30px;
  border-radius: 12px;
  width: 400px;
  text-align: center;
}
input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}
button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background: #2d5cff;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
#status {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Any Video Link to MP4</h2>
  <input id="url" placeholder="Paste Google Drive video link">
  <button onclick="convert()">Convert Now</button>
  <div id="status"></div>
</div>

<script>
async function convert() {
  const url = document.getElementById("url").value;
  const status = document.getElementById("status");

  if (!url) {
    status.innerText = "Enter a link!";
    return;
  }

  status.innerText = "Processing...";

  try {
    const res = await fetch("https://sitalama-docker.onrender.com/convert", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ url })
    });

    if (!res.ok) {
      const err = await res.text();
      status.innerText = "Error: " + err;
      return;
    }

    const blob = await res.blob();

    const downloadUrl = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = downloadUrl;
    a.download = "video.mp4";
    a.click();

    status.innerText = "Download started!";
  } catch (e) {
    status.innerText = "Failed: " + e.message;
  }
}
</script>

</body>
</html>
