<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Any Video Link Downloader</title>

<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#111827;
padding:30px;
border-radius:16px;
}

input,select,button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

a{
display:block;
margin-top:20px;
padding:14px;
background:#10b981;
color:white;
text-decoration:none;
border-radius:10px;
text-align:center;
}
</style>
</head>
<body>

<div class="container">

<h1>Any Video Link to MP4</h1>

<input type="text" id="link" placeholder="Paste Any Video Link">

<select id="quality">
<option>1080p</option>
<option>720p</option>
<option>480p</option>
</select>

<button onclick="generate()">Generate Download</button>

<div id="result"></div>

</div>

<script>
function generate(){

let url = document.getElementById("link").value.trim();

if(url===""){
alert("Paste video link first");
return;
}

document.getElementById("result").innerHTML =
`<a href="${url}" target="_blank">Open / Download Video</a>`;
}
</script>

</body>
</html>
