<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Media Converter</title>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#070b16;
  min-height:100vh;
  color:#fff;
  overflow-x:hidden;
}

body:before,
body:after{
  content:'';
  position:fixed;
  filter:blur(60px);
  border-radius:50%;
  opacity:.45;
  animation:float 10s ease-in-out infinite;
}

body:before{
  width:320px;
  height:320px;
  background:#2563eb;
  top:8%;
  left:6%;
}

body:after{
  width:380px;
  height:380px;
  background:#10b981;
  right:8%;
  bottom:8%;
  animation-delay:-4s;
}

.stars{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%,rgba(255,255,255,.15) 1px,transparent 1px),
    radial-gradient(circle at 80% 30%,rgba(255,255,255,.12) 1px,transparent 1px),
    radial-gradient(circle at 40% 70%,rgba(255,255,255,.12) 1px,transparent 1px);
  background-size:180px 180px;
  opacity:.35;
  pointer-events:none;
}

.wrap{
  max-width:1150px;
  margin:auto;
  padding:32px;
  position:relative;
  z-index:2;
}

.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
  padding:28px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.hero{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:center;
  flex-wrap:wrap;
}

.title{
  font-size:36px;
  font-weight:800;
}

.sub{
  opacity:.8;
}

.drop{
  margin-top:20px;
  border:2px dashed rgba(255,255,255,.25);
  padding:34px;
  border-radius:22px;
  text-align:center;
}

.btns{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:18px;
}

.btn,
#format{
  border:none;
  padding:14px 18px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
}

.primary{
  background:#2563eb;
  color:#fff;
}

.secondary{
  background:#10b981;
  color:#fff;
}

.ghost,
#format{
  background:rgba(255,255,255,.08);
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:14px;
  margin-top:22px;
}

.item{
  background:rgba(255,255,255,.06);
  padding:14px;
  border-radius:18px;
}

.meta{
  font-size:13px;
  opacity:.8;
  margin-top:6px;
}

.progress{
  height:9px;
  background:rgba(255,255,255,.08);
  border-radius:99px;
  overflow:hidden;
  margin-top:10px;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#3b82f6);
  transition:.2s;
}

.status{
  margin-top:8px;
  font-size:14px;
}

.footer{
  margin-top:18px;
  opacity:.8;
}

.download-btn{
  display:inline-block;
  margin-top:8px;
  color:#fff;
  background:#10b981;
  padding:8px 12px;
  border-radius:8px;
  text-decoration:none;
  font-size:14px;
}

@keyframes float{
  0%,100%{
    transform:translateY(0);
  }
  50%{
    transform:translateY(-24px);
  }
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="wrap">
  <div class="card">

    <div class="hero">
      <div>
        <div class="title">Pro Bulk Converter</div>
        <div class="sub">Convert video files using FFmpeg</div>
      </div>

      <div id="global">Ready</div>
    </div>

    <div class="drop" id="drop">
      Drag & Drop Files Here
      <br><br>
      <input id="files" type="file" multiple>
    </div>

    <div class="btns">

      <button class="btn primary" onclick="loadEngine()">
        Load Engine
      </button>

      <select id="format">
        <option value="mp4">MP4</option>
        <option value="mov">MOV</option>
        <option value="avi">AVI</option>
        <option value="mkv">MKV</option>
        <option value="webm">WEBM</option>
      </select>

      <button class="btn secondary" onclick="startConvert()">
        Convert All
      </button>

      <button class="btn ghost" onclick="clearQueue()">
        Clear
      </button>

    </div>

    <div class="grid" id="list"></div>

    <div class="footer">
      Large files may require high RAM in browser.
    </div>

  </div>
</div>

<script>

function el(id){
  return document.getElementById(id);
}

let files = [];
let ffmpeg = null;
let fetchFile = null;

function render(){

  el('list').innerHTML = files.map((f,i)=>`

    <div class="item">

      <b>${f.name}</b>

      <div class="meta">
        ${(f.size/1048576).toFixed(2)} MB
      </div>

      <div class="progress">
        <div class="bar" id="bar${i}"></div>
      </div>

      <div class="status" id="msg${i}">
        Ready
      </div>

    </div>

  `).join('');
}

window.addEventListener('DOMContentLoaded',()=>{

  el('files').onchange=(e)=>{
    files=[...e.target.files];
    render();
  };

  const drop=el('drop');

  drop.ondragover=(e)=>{
    e.preventDefault();
  };

  drop.ondrop=(e)=>{
    e.preventDefault();
    files=[...e.dataTransfer.files];
    render();
  };

});

async function loadEngine(){

  try{

    if(ffmpeg){
      el('global').innerText='Engine Already Loaded';
      return;
    }

    el('global').innerText='Loading FFmpeg...';

    const ffmpegModule = FFmpeg;

    const createFFmpeg = ffmpegModule.createFFmpeg;

    fetchFile = ffmpegModule.fetchFile;

    ffmpeg = createFFmpeg({
      log:true
    });

    await ffmpeg.load();

    el('global').innerText='FFmpeg Loaded Successfully';

  }catch(err){

    console.error(err);

    el('global').innerText='Failed to Load Engine';
  }
}

function clearQueue(){

  files=[];

  el('files').value='';

  render();

  el('global').innerText='Queue Cleared';
}

async function startConvert(){

  if(!ffmpeg){
    el('global').innerText='Load Engine First';
    return;
  }

  if(!files.length){
    el('global').innerText='Select Files First';
    return;
  }

  const ext = el('format').value;

  el('global').innerText='Converting...';

  for(let i=0;i<files.length;i++){

    const file = files[i];

    try{

      el('msg'+i).innerText='Preparing...';

      ffmpeg.setProgress(({ ratio })=>{

        const percent = Math.min(100, ratio*100);

        el('bar'+i).style.width = percent + '%';

        el('msg'+i).innerText =
          'Converting ' + percent.toFixed(0) + '%';
      });

      const inputName = file.name;

      const outputName =
        file.name.replace(/\.[^.]+$/,'') + '.' + ext;

      ffmpeg.FS(
        'writeFile',
        inputName,
        await fetchFile(file)
      );

      if(ext === 'webm'){

        await ffmpeg.run(
          '-i',
          inputName,
          '-c:v',
          'libvpx',
          '-c:a',
          'libvorbis',
          outputName
        );

      }else{

        await ffmpeg.run(
          '-i',
          inputName,
          '-c:v',
          'libx264',
          '-c:a',
          'aac',
          outputName
        );
      }

      const data = ffmpeg.FS(
        'readFile',
        outputName
      );

      let mime='video/mp4';

      if(ext==='webm') mime='video/webm';
      if(ext==='mkv') mime='video/x-matroska';
      if(ext==='avi') mime='video/x-msvideo';
      if(ext==='mov') mime='video/quicktime';

      const blob = new Blob(
        [data.buffer],
        { type:mime }
      );

      const url = URL.createObjectURL(blob);

      el('msg'+i).innerHTML = `
        Completed
        <br><br>
        <a class="download-btn"
           href="${url}"
           download="${outputName}">
           Download ${outputName}
        </a>
      `;

      ffmpeg.FS('unlink', inputName);
      ffmpeg.FS('unlink', outputName);

    }catch(err){

      console.error(err);

      el('msg'+i).innerText='Conversion Failed';
    }
  }

  el('global').innerText='All Conversions Completed';
}

</script>

</body>
</html>
